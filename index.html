<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sorgula">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.20.0"></script>
<title>Kolay Gelsin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{--bg:#080e08;--card:#0f170f;--border:#1a2a1a;--text:#e8f0e8;--text2:#4a6a4a;--accent:#4db84d;--accent2:#3da83d;--btn-bg:#0f1f0f;--success:#4caf50;--err-bg:#1a0808;--err-border:#3d1515;--err-text:#e05555;--shadow:rgba(0,0,0,.6);--logo-op:0.04;--adres:#a0b8a0;--warn:#ff8c42;--w-bg:rgba(255,140,66,.08);--w-brd:rgba(255,140,66,.3);--w-old-bg:rgba(239,83,80,.1);--w-new-bg:rgba(102,187,106,.1)}
[data-theme="light"]{--bg:#f2f8f2;--card:#fff;--border:#cce8cc;--text:#0f1f0f;--text2:#7a9a7a;--accent:#3da83d;--accent2:#2d982d;--btn-bg:#e0f0e0;--success:#2e7d32;--err-bg:#fff0f0;--err-border:#ffcdd2;--err-text:#c62828;--shadow:rgba(0,50,0,.08);--logo-op:0.07;--adres:#3a5a3a;--warn:#e07030;--w-bg:#fff3e0;--w-brd:#ffe0b2;--w-old-bg:#ffebee;--w-new-bg:#e8f5e9}
[data-theme="colorful"]{--bg:#05100a;--card:rgba(255,255,255,.05);--border:rgba(77,184,77,.2);--text:#e0ffe0;--text2:#4a7a5a;--accent:#4db84d;--accent2:#3da83d;--btn-bg:rgba(77,184,77,.1);--success:#00e676;--err-bg:rgba(255,0,0,.06);--err-border:rgba(255,80,80,.25);--err-text:#ff7070;--shadow:rgba(0,0,0,.7);--logo-op:0.05;--adres:#7aff9a;--warn:#ffaa44;--w-bg:rgba(255,170,68,.1);--w-brd:rgba(255,170,68,.3);--w-old-bg:rgba(255,112,112,.1);--w-new-bg:rgba(0,230,118,.1)}
[data-theme="night"]{--bg:#0a0a1a;--card:#10102a;--border:#1a1a3a;--text:#d0d0ff;--text2:#4a4a8a;--accent:#7070ff;--accent2:#5050ee;--btn-bg:#10102a;--success:#4caf50;--err-bg:#1a0808;--err-border:#3d1515;--err-text:#e05555;--shadow:rgba(0,0,0,.7);--logo-op:0.04;--adres:#9090cc;--warn:#ff9944;--w-bg:rgba(255,153,68,.1);--w-brd:rgba(255,153,68,.3);--w-old-bg:rgba(224,85,85,.1);--w-new-bg:rgba(76,175,80,.1)}
[data-theme="sunset"]{--bg:#1a0a05;--card:#2a1208;--border:#3a1a0a;--text:#ffe8d0;--text2:#8a5a3a;--accent:#ff8c42;--accent2:#e07030;--btn-bg:#2a1208;--success:#4caf50;--err-bg:#1a0808;--err-border:#3d1515;--err-text:#e05555;--shadow:rgba(0,0,0,.6);--logo-op:0.04;--adres:#ffb880;--warn:#ffcc44;--w-bg:rgba(255,204,68,.1);--w-brd:rgba(255,204,68,.3);--w-old-bg:rgba(224,85,85,.1);--w-new-bg:rgba(76,175,80,.1)}
[data-theme="ocean"]{--bg:#05080f;--card:#080f1f;--border:#0f1f3a;--text:#d0e8ff;--text2:#3a6a9a;--accent:#4a9aff;--accent2:#3a8aee;--btn-bg:#080f1f;--success:#00e676;--err-bg:#1a0808;--err-border:#3d1515;--err-text:#e05555;--shadow:rgba(0,0,0,.7);--logo-op:0.04;--adres:#80c0ff;--warn:#ffaa44;--w-bg:rgba(255,170,68,.1);--w-brd:rgba(255,170,68,.3);--w-old-bg:rgba(224,85,85,.1);--w-new-bg:rgba(0,230,118,.1)}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 20px 24px;transition:background .3s,color .3s;position:relative;overflow-x:hidden}
[data-theme="colorful"] body{background:radial-gradient(ellipse at 30% 20%,#0a2010,#05100a)}
[data-theme="night"] body{background:radial-gradient(ellipse at 50% 0%,#15153a,#0a0a1a)}
[data-theme="sunset"] body{background:radial-gradient(ellipse at 50% 0%,#3a1505,#1a0a05)}
[data-theme="ocean"] body{background:radial-gradient(ellipse at 50% 0%,#05101f,#05080f)}

.bg-logo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90vw;max-width:500px;opacity:var(--logo-op);pointer-events:none;z-index:0}

.tbar{position:fixed;top:16px;right:16px;z-index:100}
.tpicker{position:relative}
.tacik{width:38px;height:38px;border-radius:50%;border:2px solid var(--accent);background:var(--btn-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 12px var(--shadow)}
.tacik:active{transform:scale(.9)}
.tacik svg{width:20px;height:20px;color:var(--accent)}
.tdrop{display:none;position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 8px;box-shadow:0 8px 32px var(--shadow);flex-direction:column;gap:8px;align-items:center;min-width:44px}
.tdrop.show{display:flex}
.tdot{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .25s}
.tdot:active{transform:scale(.82)}
.tdot.active{transform:scale(1.2);border-color:var(--text)!important}
.tdot.dark{background:radial-gradient(circle at 35% 35%,#1a2a1a,#080e08);border-color:#4db84d}
.tdot.light{background:radial-gradient(circle at 35% 35%,#fff,#cce8cc);border-color:#3da83d}
.tdot.colorful{background:linear-gradient(135deg,#4db84d,#00e676,#0a2010)}
.tdot.night{background:linear-gradient(135deg,#7070ff,#1a1a4a,#0a0a1a)}
.tdot.sunset{background:linear-gradient(135deg,#ff8c42,#cc4400,#1a0a05)}
.tdot.ocean{background:linear-gradient(135deg,#4a9aff,#0055cc,#05080f)}

.wrap{width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;padding-top:14vh;transition:padding-top .5s cubic-bezier(.4,0,.2,1)}
.wrap.compact{padding-top:5vh}
.hdr{text-align:center;transition:all .5s cubic-bezier(.4,0,.2,1);margin-bottom:8px}
.hdr img.logo{max-width:160px;height:auto;display:block;margin:0 auto 10px;transition:all .5s cubic-bezier(.4,0,.2,1)}
.hdr .kg{font-size:26px;font-weight:800;letter-spacing:6px;color:var(--accent);text-transform:uppercase;display:block;transition:all .5s cubic-bezier(.4,0,.2,1);line-height:1.1}
.hdr h1{font-size:13px;font-weight:400;letter-spacing:3px;color:var(--text2);text-transform:uppercase;transition:all .5s cubic-bezier(.4,0,.2,1);margin-top:6px}
.hdr.compact img.logo{max-width:60px;margin-bottom:5px}
.hdr.compact .kg{font-size:14px;letter-spacing:4px}
.hdr.compact h1{font-size:9px;letter-spacing:2px;margin-top:2px}

.card{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow)}
label{display:block;font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;font-family:'DM Mono',monospace}
.irow{display:flex;gap:8px;margin-bottom:10px;align-items:stretch}
input{flex:1;min-width:0;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:16px;font-family:'DM Mono',monospace;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(77,184,77,.12)}
input::placeholder{color:var(--text2);font-size:12px;opacity:.7;font-family:'Outfit',sans-serif}
.pbtn{flex-shrink:0;background:var(--btn-bg);border:1.5px solid var(--border);border-radius:12px;padding:0 14px;color:var(--accent);font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:5px}
.pbtn:active{transform:scale(.95)}
.brow{display:flex;gap:8px}
.sbtn{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:1.5px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(77,184,77,.35)}
.sbtn:active{transform:scale(.98);background:var(--accent2)}
.sbtn:disabled{background:var(--border);color:var(--text2);cursor:not-allowed;box-shadow:none}
.gbtn{background:var(--btn-bg);border:1.5px solid var(--border);border-radius:12px;padding:15px 16px;color:var(--accent);font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.gbtn:active{transform:scale(.95)}

.gpanel{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow);display:none}
.gpanel.show{display:block}
.ghdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.gtitle{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace}
.gtimer{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace}
.gliste{overflow-y:auto;max-height:300px}
.gitem{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.gitem:last-child{border-bottom:none}
.gitem:active{background:rgba(77,184,77,.08)}
.gno{font-size:13px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace}
.gad{font-size:13px;font-weight:500;color:var(--text);text-align:right;max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbos{padding:24px;text-align:center;font-size:13px;color:var(--text2)}

.result{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow);display:none}
.result.show{display:block}
.rrow{padding:11px 0;border-bottom:1px solid var(--border)}
.rrow:last-child{border-bottom:none;padding-bottom:0}
.rrow:first-child{padding-top:0}
.rlabel{font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:4px;font-family:'DM Mono',monospace}
.rval{font-size:17px;font-weight:600;color:var(--text)}
.rval.name{font-size:20px;font-weight:700}
.rval.adres{font-size:14px;font-weight:500;color:var(--adres);line-height:1.6}

/* --- YENİ ADRES DEĞİŞİKLİĞİ UYARI TASARIMI --- */
.warn-box{display:none;margin-top:10px;background:var(--w-bg);border:1px solid var(--w-brd);border-radius:12px;padding:14px}
.warn-box.show{display:block}
.warn-title{font-size:10px;font-weight:800;color:var(--warn);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.warn-subtitle{font-size:12px;color:var(--warn);margin-bottom:12px;font-weight:500;opacity:0.9}

.warn-parsed-container{display:none;flex-direction:column;gap:10px}
.warn-inner{border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:4px}

.warn-inner.old-addr{border-left:4px solid #ef5350;background:var(--w-old-bg)}
.warn-inner.new-addr{border-left:4px solid #66bb6a;background:var(--w-new-bg)}

.warn-inner-title{font-size:9px;font-weight:800;letter-spacing:1.5px}
.warn-inner.old-addr .warn-inner-title{color:#ef5350}
.warn-inner.new-addr .warn-inner-title{color:#66bb6a}

.warn-inner-text{font-size:13px;color:var(--text);line-height:1.4;font-weight:500}
.warn-text{font-size:12px;color:var(--text);line-height:1.5;display:none} /* Raw fallback */

.prow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pinfo{display:flex;flex-direction:column;gap:3px;min-width:0}
.pnum{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:1.5px;font-family:'DM Mono',monospace}
.p4{font-size:11px;color:var(--text2);font-weight:500;font-family:'DM Mono',monospace}
.pacts{display:flex;gap:10px;flex-shrink:0}
.abtn{width:52px;height:52px;border-radius:14px;border:1.5px solid rgba(77,184,77,.25);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;transition:all .2s;background:rgba(77,184,77,.07);text-decoration:none;gap:3px;color:var(--accent)}
.abtn:active{transform:scale(.88)}
.abtn svg{width:22px;height:22px}
.abtn .bl{font-size:8px;font-weight:700;letter-spacing:.5px;font-family:'Outfit',sans-serif;color:var(--text2)}
.abtn.copied{color:var(--success);border-color:var(--success);background:rgba(76,175,80,.1)}
.abtn.copied .bl{color:var(--success)}

.barkod-btn{width:100%;background:var(--btn-bg);border:1.5px solid var(--border);border-radius:12px;padding:13px;color:var(--accent);font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;display:none;align-items:center;justify-content:center;gap:8px;margin-top:2px}
.barkod-btn:active{transform:scale(.98)}
.barkod-panel{display:none;background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 20px var(--shadow)}
.barkod-panel.show{display:block}
.barkod-phdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.barkod-ptitle{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace}
.barkod-loading{text-align:center;padding:24px;color:var(--text2);font-size:13px;display:none}
.barkod-loading.show{display:block}
.barkod-spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
.barkod-icerik{padding:12px;display:none}
.barkod-icerik.show{display:block}
.barkod-frame{width:100%;height:380px;border:none;border-radius:8px;background:#fff}
.barkod-acts{display:none;gap:8px;padding:0 12px 12px}
.barkod-indir{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.barkod-indir:active{transform:scale(.98);background:var(--accent2)}

.loading{display:none;text-align:center;padding:20px;color:var(--text2);font-size:13px}
.loading.show{display:block}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{display:none;background:var(--err-bg);border:1px solid var(--err-border);border-radius:12px;padding:12px 16px;color:var(--err-text);font-size:13px;text-align:center}
.err.show{display:block}

.orow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 4px}
.olabel{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.3px;font-family:'Outfit',sans-serif}
.oswitch{position:relative;width:40px;height:22px;flex-shrink:0}
.oswitch input{opacity:0;width:0;height:0;position:absolute}
.oslider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:22px;transition:.2s}
.oslider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.oswitch input:checked+.oslider{background:var(--accent)}
.oswitch input:checked+.oslider:before{transform:translateX(18px)}

.tarama-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px}
.tarama-modal.show{display:flex}
.tarama-box{background:var(--card);border-radius:18px;padding:16px;width:100%;max-width:380px;border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow)}
.tarama-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tarama-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace}
.tarama-kapat{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;padding:0}
.tarama-video{width:100%;border-radius:10px;background:#000;max-height:320px;object-fit:cover;display:block}
.tarama-hint{font-size:11px;color:var(--text2);text-align:center;margin-top:8px}
.tarama-err{display:none;color:var(--err-text);font-size:12px;text-align:center;margin-top:8px;background:var(--err-bg);border:1px solid var(--err-border);border-radius:8px;padding:8px}
</style>
</head>
<body>
<img class="bg-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Kolay_Gelsin_logo.png/800px-Kolay_Gelsin_logo.png" alt="" onerror="this.style.display='none'">

<div class="tbar">
  <div class="tpicker" id="tpicker">
    <button class="tacik" onclick="tdrop()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
    </button>
    <div class="tdrop" id="tdrop">
      <button class="tdot dark" onclick="tema('dark')" title="Koyu"></button>
      <button class="tdot light" onclick="tema('light')" title="Acik"></button>
      <button class="tdot colorful" onclick="tema('colorful')" title="Renkli"></button>
      <button class="tdot night" onclick="tema('night')" title="Gece"></button>
      <button class="tdot sunset" onclick="tema('sunset')" title="Gunbatimi"></button>
      <button class="tdot ocean" onclick="tema('ocean')" title="Okyanus"></button>
    </div>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="hdr" id="hdr">
    <img class="logo" src="https://raw.githubusercontent.com/feryts/SmsKargo/main/logo.png" alt="" onerror="this.style.display='none'">
    <span class="kg">KOLAY GELSİN</span>
    <h1>GONDERİ SORGULA</h1>
  </div>
  <div class="card">
    <label>Gonderi No</label>
    <div class="irow">
      <input type="text" id="no" placeholder="Numara girin..." inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="pbtn" onclick="yapistir()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg>
        Yapıştır
      </button>
      <button class="pbtn" onclick="taramaBaslat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm16 0h2v6h-6v-2h4v-4zM7 7h2v2H7V7zm0 4h2v2H7v-2zm4-4h2v2h-2V7zm4 0h2v2h-2V7zm-4 4h2v2h-2v-2zm4 0h2v2h-2v-2zm-4 4h2v2h-2v-2zm4 0h2v2h-2v-2z"/></svg>
        Tara
      </button>
    </div>
    <div class="orow">
      <span class="olabel">Otomatik Ara (yazma/tarama sonrası)</span>
      <label class="oswitch">
        <input type="checkbox" id="otoAra">
        <span class="oslider"></span>
      </label>
    </div>
    <div class="brow">
      <button class="sbtn" id="sbtn" onclick="sorgula()">SORGULA</button>
      <button class="gbtn" onclick="gtoggle()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        GEÇMİŞ
      </button>
    </div>
  </div>
  <div class="tarama-modal" id="taramaModal">
    <div class="tarama-box">
      <div class="tarama-hdr">
        <span class="tarama-title">Barkod / QR Tara</span>
        <button class="tarama-kapat" onclick="taramaDurdur()">×</button>
      </div>
      <video id="taramaVideo" class="tarama-video"></video>
      <div class="tarama-hint">Kamerayı barkod veya QR koduna doğrultun</div>
      <div class="tarama-err" id="taramaHata"></div>
    </div>
  </div>
  <div class="gpanel" id="gpanel">
    <div class="ghdr">
      <span class="gtitle">Sorgu Geçmişi</span>
      <span class="gtimer" id="gtimer"></span>
    </div>
    <div class="gliste" id="gliste"></div>
  </div>
  <div class="loading" id="loading"><div class="spin"></div>Sorgulanıyor...</div>
  <div class="err" id="err"></div>
  <div class="result" id="result">
    <div class="rrow"><div class="rlabel">Gonderi No</div><div class="rval" id="rno"></div></div>
    <div class="rrow"><div class="rlabel">Ad Soyad</div><div class="rval name" id="rad"></div></div>
    <div class="rrow">
      <div class="rlabel">Adres</div>
      <div class="rval adres" id="radr"></div>
      
      <div class="warn-box" id="warnbox">
        <div class="warn-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm0 3.99L19.53 19H4.47L12 5.99zM11 16h2v2h-2zm0-6h2v4h-2z"/></svg>
          ADRES DEĞİŞİKLİĞİ
        </div>
        <div class="warn-subtitle" id="warnsubtitle">Alıcı adresi değişti.</div>
        
        <div class="warn-parsed-container" id="warn-parsed-container">
          <div class="warn-inner old-addr">
            <div class="warn-inner-title">ESKİ ADRES</div>
            <div class="warn-inner-text" id="warn-old-text"></div>
          </div>
          <div class="warn-inner new-addr">
            <div class="warn-inner-title">YENİ ADRES</div>
            <div class="warn-inner-text" id="warn-new-text"></div>
          </div>
        </div>
        
        <div class="warn-text" id="warntext"></div>
      </div>
      
    </div>
    <div class="rrow">
      <div class="rlabel">Telefon</div>
      <div class="prow">
        <div class="pinfo">
          <span class="pnum" id="pnum"></span>
          <span class="p4" id="p4"></span>
        </div>
        <div class="pacts">
          <button class="abtn" id="cbtn" onclick="kopyala()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span class="bl" id="clbl">SON 4</span>
          </button>
          <a class="abtn" id="callbtn" href="#">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            <span class="bl">ARA</span>
          </a>
        </div>
      </div>
    </div>
    
    <button class="barkod-btn" id="barkodBtn" onclick="barkodToggle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4h2v16H2zm3 0h1v16H5zm2 0h2v16H7zm3 0h1v16h-1zm2 0h2v16h-2zm3 0h1v16h-1zm2 0h1v16h-1zm2 0h2v16h-2z"/></svg>
      ETİKET GÖSTER
    </button>
    <div class="barkod-panel" id="barkodPanel">
      <div class="barkod-phdr">
        <span class="barkod-ptitle">Kargo Etiketi</span>
        <button onclick="barkodKapat()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:0">×</button>
      </div>
      <div class="barkod-loading" id="barkodLoading"><div class="barkod-spin"></div>Etiket yukleniyor...</div>
      <div class="barkod-icerik" id="barkodIcerik">
        <iframe id="barkodFrame" class="barkod-frame"></iframe>
      </div>
      <div class="barkod-acts" id="barkodActs">
        <button class="barkod-indir" onclick="barkodIndir()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>İNDİR
        </button>
      </div>
    </div>
  </div>
</div>

<script>
let currentShipmentItemId = null; 

function tema(t){
  document.documentElement.setAttribute("data-theme",t);
  localStorage.setItem("tema",t);
  document.querySelectorAll(".tdot").forEach(b=>b.classList.remove("active"));
  const d=document.querySelector(".tdot."+t);
  if(d)d.classList.add("active");
  document.getElementById("tdrop").classList.remove("show");
}
tema(localStorage.getItem("tema")||"dark");

function tdrop(){document.getElementById("tdrop").classList.toggle("show");}
document.addEventListener("click",function(e){
  if(!e.target.closest("#tpicker"))document.getElementById("tdrop").classList.remove("show");
});

const GK="sorgu_gecmis",GZK="sorgu_gecmis_zaman",GS=3*60*60*1000;
function gal(){
  const z=parseInt(localStorage.getItem(GZK)||"0");
  if(z&&Date.now()-z>GS){localStorage.removeItem(GK);localStorage.setItem(GZK,Date.now().toString());return[];}
  try{return JSON.parse(localStorage.getItem(GK)||"[]");}catch(e){return[];}
}
function gekle(no,ad){
  let l=gal();l=l.filter(g=>g.no!==no);l.unshift({no,ad});
  if(l.length>50)l=l.slice(0,50);
  localStorage.setItem(GK,JSON.stringify(l));
  if(!localStorage.getItem(GZK))localStorage.setItem(GZK,Date.now().toString());
}
function gguncelle(){
  const l=gal(),el=document.getElementById("gliste");
  if(!l.length){el.innerHTML='<div class="gbos">Henüz sorgu yapılmadı</div>';return;}
  el.innerHTML=l.map(g=>`<div class="gitem" onclick="gsec('${g.no}')"><span class="gno">${g.no}</span><span class="gad">${g.ad||""}</span></div>`).join("");
}
function gsec(no){document.getElementById("no").value=no;document.getElementById("gpanel").classList.remove("show");sorgula();}
function gtoggle(){
  const p=document.getElementById("gpanel");
  if(p.classList.contains("show")){p.classList.remove("show");}else{gguncelle();p.classList.add("show");}
}
function gsayac(){
  const z=parseInt(localStorage.getItem(GZK)||"0");
  if(!z){document.getElementById("gtimer").textContent="";return;}
  const k=GS-(Date.now()-z);
  if(k<=0){localStorage.removeItem(GK);localStorage.setItem(GZK,Date.now().toString());document.getElementById("gtimer").textContent="Sıfırlandı";gguncelle();return;}
  const s=Math.floor(k/3600000),d=Math.floor((k%3600000)/60000),sn=Math.floor((k%60000)/1000);
  document.getElementById("gtimer").textContent=`${s}:${String(d).padStart(2,"0")}:${String(sn).padStart(2,"0")}`;
}
setInterval(gsayac,1000);gsayac();

document.getElementById("no").addEventListener("keydown",e=>{if(e.key==="Enter")sorgula();});

let otoAraTimer=null;
const otoAraKutu=document.getElementById("otoAra");
otoAraKutu.checked=localStorage.getItem("otoAra")==="1";
otoAraKutu.addEventListener("change",function(){
  localStorage.setItem("otoAra",this.checked?"1":"0");
  if(otoAraTimer){clearTimeout(otoAraTimer);otoAraTimer=null;}
  if(this.checked){
    const v=document.getElementById("no").value.trim();
    if(v.length>=6)sorgula();
  }
});

document.getElementById("no").addEventListener("input",function(){
  if(!this.value){
    document.getElementById("hdr").classList.remove("compact");
    document.getElementById("wrap").classList.remove("compact");
    document.getElementById("result").classList.remove("show");
    document.getElementById("err").classList.remove("show");
  }
  if(otoAraTimer){clearTimeout(otoAraTimer);otoAraTimer=null;}
  if(otoAraKutu.checked){
    const v=this.value.trim();
    if(v.length>=6){
      otoAraTimer=setTimeout(()=>{sorgula();},5000);
    }
  }
});

async function yapistir(){
  try{
    const t=await navigator.clipboard.readText();
    const c=t.trim().replace(/[^a-zA-Z0-9]/g,"");
    if(c){document.getElementById("no").value=c;sorgula();}
  }catch(e){document.getElementById("no").focus();}
}

let taramaOkuyucu=null;

async function taramaBaslat(){
  const modal=document.getElementById("taramaModal");
  const hataEl=document.getElementById("taramaHata");
  hataEl.style.display="none";
  modal.classList.add("show");
  try{
    taramaOkuyucu=new ZXing.BrowserMultiFormatReader();
    const cihazlar=await taramaOkuyucu.listVideoInputDevices();
    if(!cihazlar.length)throw new Error("Kamera bulunamadi");
    const arkaKamera=cihazlar.find(c=>/back|rear|arka/i.test(c.label))||cihazlar[cihazlar.length-1];
    taramaOkuyucu.decodeFromVideoDevice(arkaKamera.deviceId,"taramaVideo",(sonuc,hata)=>{
      if(sonuc){
        const metin=sonuc.getText().trim().replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
        taramaDurdur();
        if(metin){
          document.getElementById("no").value=metin;
          taramaKopyala(metin);
          if(otoAraKutu.checked)sorgula();
        }
      }
    });
  }catch(e){
    hataEl.textContent="Kamera acilamadi: "+e.message;
    hataEl.style.display="block";
  }
}

function taramaDurdur(){
  if(taramaOkuyucu){taramaOkuyucu.reset();taramaOkuyucu=null;}
  document.getElementById("taramaModal").classList.remove("show");
}

function taramaKopyala(metin){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(metin).catch(()=>{});
  }
}

function kopyala(){
  const tel=document.getElementById("pnum").textContent;
  if(!tel)return;
  navigator.clipboard.writeText(tel.slice(-4)).then(()=>{
    const b=document.getElementById("cbtn"),l=document.getElementById("clbl");
    b.classList.add("copied");l.textContent="✓";
    setTimeout(()=>{b.classList.remove("copied");l.textContent="SON 4";},2000);
  });
}

async function barkodToggle() {
  const panel = document.getElementById("barkodPanel");
  const iframe = document.getElementById("barkodFrame");
  const loading = document.getElementById("barkodLoading");
  
  if (panel.classList.contains("show")) {
    panel.classList.remove("show");
  } else {
    panel.classList.add("show");
    document.getElementById("barkodIcerik").classList.add("show");
    document.getElementById("barkodActs").style.display = "flex";
    
    if (currentShipmentItemId && !iframe.srcdoc) {
      loading.classList.add("show");
      iframe.style.display = "none";
      try {
        const res = await fetch("/barkod", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shipmentItemId: currentShipmentItemId })
        });
        const data = await res.json();
        
        if (data.hata) {
          hata("Etiket hatası: " + data.hata);
        } else if (data.etiket) {
          iframe.srcdoc = data.etiket; 
        }
      } catch (e) {
        hata("Etiket yüklenirken sunucu hatası.");
      } finally {
        loading.classList.remove("show");
        iframe.style.display = "block";
      }
    }
  }
}

function barkodKapat() {
  document.getElementById("barkodPanel").classList.remove("show");
}

function barkodIndir() {
  const iframe = document.getElementById("barkodFrame");
  const no = document.getElementById("rno").textContent || "Bilinmiyor";
  
  if(!iframe.srcdoc) {
    alert("İndirilecek etiket henüz yüklenmedi.");
    return;
  }
  
  const blob = new Blob([iframe.srcdoc], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = `Etiket_${no}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function sorgula(){
  const no=document.getElementById("no").value.trim().replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
  if(!no||no.length<6){hata("Gecerli bir numara girin.");return;}
  
  document.getElementById("gpanel").classList.remove("show");
  document.getElementById("result").classList.remove("show");
  document.getElementById("err").classList.remove("show");
  document.getElementById("loading").classList.add("show");
  document.getElementById("sbtn").disabled=true;
  
  document.getElementById("barkodBtn").style.display = "none";
  document.getElementById("barkodPanel").classList.remove("show");
  document.getElementById("barkodFrame").srcdoc = ""; 
  currentShipmentItemId = null; 

  try{
    const r=await fetch("/sorgula",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({gonderiNo:no})});
    const d=await r.json();
    if(d.hata){hata(d.hata);return;}
    
    document.getElementById("rno").textContent=no;
    document.getElementById("rad").textContent=d.adSoyad||"Bulunamadi";
    document.getElementById("radr").textContent=d.adres||"Bulunamadi";
    
    const wb = document.getElementById("warnbox");
    const warnParsed = document.getElementById("warn-parsed-container");
    const warnRaw = document.getElementById("warntext");
    const oldT = document.getElementById("warn-old-text");
    const newT = document.getElementById("warn-new-text");
    const subtitle = document.getElementById("warnsubtitle");

    if(d.adresDegisiklik){
      wb.classList.add("show");
      let text = d.adresDegisiklik;
      let upperText = text.toUpperCase();

      // ESKİ ADRES ve YENİ ADRES kelimelerini ayıklama
      let eskiIndex = upperText.indexOf("ESKİ ADRES");
      let yeniIndex = upperText.indexOf("YENİ ADRES");

      if(eskiIndex !== -1 && yeniIndex !== -1 && eskiIndex < yeniIndex) {
         let preText = text.substring(0, eskiIndex).trim();
         let eskiPart = text.substring(eskiIndex + 10, yeniIndex).replace(/^[\s:\-]+/, "").trim(); 
         let yeniPart = text.substring(yeniIndex + 10).replace(/^[\s:\-]+/, "").trim();

         if(preText) subtitle.textContent = preText;
         else subtitle.textContent = "Alıcı adresi değişti.";

         oldT.textContent = eskiPart;
         newT.textContent = yeniPart;

         warnParsed.style.display = "flex";
         warnRaw.style.display = "none";
      } else {
         subtitle.textContent = "Alıcı adresi değişti.";
         warnParsed.style.display = "none";
         warnRaw.textContent = text;
         warnRaw.style.display = "block";
      }
    }else{
      wb.classList.remove("show");
    }
    
    const tel=d.telefon||"";
    document.getElementById("pnum").textContent=tel;
    document.getElementById("p4").textContent=tel.length>=4?"Son 4: "+tel.slice(-4):"";
    const cb=document.getElementById("callbtn");
    if(tel){cb.href="tel:"+tel;cb.style.display="flex";}else{cb.style.display="none";}
    
    document.getElementById("hdr").classList.add("compact");
    document.getElementById("wrap").classList.add("compact");
    document.getElementById("result").classList.add("show");
    
    if(d.shipmentItemId) {
      currentShipmentItemId = d.shipmentItemId;
      document.getElementById("barkodBtn").style.display = "flex";
    }
    
    gekle(no,d.adSoyad||"");
  }catch(e){hata("Sunucu hatasi, tekrar deneyin.");}
  finally{document.getElementById("loading").classList.remove("show");document.getElementById("sbtn").disabled=false;}
}

function hata(m){
  document.getElementById("loading").classList.remove("show");
  document.getElementById("sbtn").disabled=false;
  const e=document.getElementById("err");
  e.textContent=m;e.classList.add("show");
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
